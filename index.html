<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videy — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --accent: #e63946;
      --accent2: #ff6b6b;
      --text: #f0f0f0;
      --muted: #555;
      --border: #1e1e1e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* Ambient glow */
    .glow-red {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(230,57,70,0.12) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      pointer-events: none;
      animation: driftA 12s ease-in-out infinite alternate;
    }
    .glow-blue {
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,100,200,0.08) 0%, transparent 70%);
      bottom: -100px;
      right: -50px;
      pointer-events: none;
      animation: driftB 15s ease-in-out infinite alternate;
    }

    @keyframes driftA {
      from { transform: translate(0, 0); }
      to   { transform: translate(80px, 60px); }
    }
    @keyframes driftB {
      from { transform: translate(0, 0); }
      to   { transform: translate(-60px, -40px); }
    }

    /* Scanline effect */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.03) 3px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 99;
    }

    /* Main layout */
    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 0;
    }

    /* Logo */
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 15vw, 11rem);
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--text);
      position: relative;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .logo span {
      color: var(--accent);
    }

    /* Glitch effect on logo */
    .logo::before, .logo::after {
      content: 'VIDEY';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      font-family: 'Bebas Neue', sans-serif;
      font-size: inherit;
      letter-spacing: inherit;
    }
    .logo::before {
      color: var(--accent);
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
      animation: glitch1 6s infinite;
      opacity: 0.6;
    }
    .logo::after {
      color: #00c8ff;
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
      animation: glitch2 6s infinite;
      opacity: 0.4;
    }

    @keyframes glitch1 {
      0%, 90%, 100% { transform: translate(0); opacity: 0; }
      92% { transform: translate(-3px, 1px); opacity: 0.6; }
      94% { transform: translate(3px, -1px); opacity: 0.6; }
      96% { transform: translate(0); opacity: 0; }
    }
    @keyframes glitch2 {
      0%, 90%, 100% { transform: translate(0); opacity: 0; }
      93% { transform: translate(3px, 1px); opacity: 0.4; }
      95% { transform: translate(-3px, -1px); opacity: 0.4; }
      97% { transform: translate(0); opacity: 0; }
    }

    /* Tagline */
    .tagline {
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 2px;
      background: var(--accent);
      margin: 2.5rem auto;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.7s;
    }

    /* Coming soon text */
    .coming-soon {
      font-size: clamp(0.75rem, 1.8vw, 0.95rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.9s;
    }

    /* Play icon decoration */
    .play-ring {
      width: 56px;
      height: 56px;
      border: 1.5px solid #2a2a2a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 2.5rem auto 0;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.1s;
      position: relative;
    }
    .play-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(230,57,70,0.2);
      animation: pulse-ring 2.5s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.15); opacity: 0; }
    }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 14px solid var(--accent);
      margin-left: 3px;
    }

    /* Bottom bar */
    .bottom-bar {
      position: fixed;
      bottom: 2rem;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.3s;
    }

    .bottom-bar span {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #333;
    }

    .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.5;
    }

    /* Recording indicator */
    .rec {
      position: fixed;
      top: 2rem;
      right: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.5s;
    }
    .rec-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s ease-in-out infinite;
    }
    .rec span {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* Top left logo small */
    .top-logo {
      position: fixed;
      top: 2rem;
      left: 2rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      color: #333;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.5s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="glow-red"></div>
  <div class="glow-blue"></div>
  <div class="scanlines"></div>

  <div class="top-logo">VD</div>

  <div class="rec">
    <div class="rec-dot"></div>
    <span>Live</span>
  </div>

  <div class="container">
    <div class="logo">VIDE<span>Y</span></div>
    <p class="tagline">Streaming Platform</p>
    <div class="divider"></div>
    <p class="coming-soon">Coming Soon</p>
    <div class="play-ring">
      <div class="play-icon"></div>
    </div>
  </div>

  <div class="bottom-bar">
    <span>Videy</span>
    <div class="dot"></div>
    <span>© 2025</span>
    <div class="dot"></div>
    <span>All rights reserved</span>
  </div>

</body>
</html>

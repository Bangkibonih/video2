<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VixPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07070d; --surface:#0e0e18; --surface2:#14141f;
  --border:#1c1c2e; --red:#ff2d55; --text:#eeeef5; --muted:#55556e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Archivo',sans-serif; min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0; opacity:0.4;
}
header {
  position:sticky; top:0; z-index:50; padding:0 20px; height:60px;
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(7,7,13,0.9); backdrop-filter:blur(20px); border-bottom:1px solid var(--border);
}
.logo { font-family:'Archivo Black',sans-serif; font-size:22px; display:flex; align-items:center; gap:8px; }
.logo-dot { width:8px; height:8px; background:var(--red); border-radius:50%; box-shadow:0 0 10px var(--red); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.live-badge { display:flex; align-items:center; gap:5px; background:rgba(255,45,85,0.1); border:1px solid rgba(255,45,85,0.3); color:var(--red); font-size:11px; font-weight:500; padding:4px 10px; border-radius:20px; letter-spacing:1.5px; }
.marquee-wrap { overflow:hidden; border-bottom:1px solid var(--border); background:var(--surface); padding:10px 0; }
.marquee { display:flex; gap:40px; animation:marquee 20s linear infinite; width:max-content; }
@keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.marquee span { font-size:11px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; white-space:nowrap; }
.marquee span.hot { color:var(--red); font-weight:500; }
.container { max-width:960px; margin:0 auto; padding:28px 16px; position:relative; z-index:1; }
.section-header { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
.section-line { flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }
.section-label { font-size:10px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; white-space:nowrap; }
.section-count { font-size:10px; color:var(--red); letter-spacing:2px; }
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
@media(min-width:540px){ .grid{grid-template-columns:repeat(3,1fr);gap:14px} }
@media(min-width:760px){ .grid{grid-template-columns:repeat(4,1fr)} }
.card { position:relative; background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; cursor:pointer; transition:all 0.25s cubic-bezier(0.25,0.8,0.25,1); animation:fadeIn 0.4s ease both; }
@keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.card:hover { transform:translateY(-4px) scale(1.01); border-color:rgba(255,45,85,0.4); box-shadow:0 12px 40px rgba(0,0,0,0.5); }
.thumb { position:relative; aspect-ratio:2/3; overflow:hidden; background:var(--surface2); }
.thumb img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s ease; filter:brightness(0.85); }
.card:hover .thumb img { transform:scale(1.08); filter:brightness(1); }
.thumb::after { content:''; position:absolute; inset:0; background:linear-gradient(to bottom,transparent 40%,rgba(7,7,13,0.95) 100%); }
.play-btn { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.8); width:44px; height:44px; background:rgba(255,45,85,0.9); border-radius:50%; display:flex; align-items:center; justify-content:center; z-index:2; opacity:0; transition:all 0.2s; box-shadow:0 0 30px rgba(255,45,85,0.5); }
.play-btn svg { width:18px; height:18px; fill:white; margin-left:2px; }
.card:hover .play-btn { opacity:1; transform:translate(-50%,-50%) scale(1); }
.card-info { position:absolute; bottom:0; left:0; right:0; padding:12px 10px 10px; z-index:3; }
.card-num { font-size:9px; letter-spacing:3px; color:var(--red); margin-bottom:3px; text-transform:uppercase; }
.card-title { font-family:'Archivo Black',sans-serif; font-size:12px; line-height:1.3; color:var(--text); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.count-badge { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(8px); color:white; font-size:10px; font-weight:500; padding:3px 8px; border-radius:20px; z-index:3; }
.new-badge { position:absolute; top:8px; left:8px; background:var(--red); color:white; font-size:9px; font-weight:700; padding:3px 7px; border-radius:4px; z-index:3; letter-spacing:1px; text-transform:uppercase; }
.skeleton { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.skel-thumb { aspect-ratio:2/3; background:linear-gradient(90deg,#1a1a2e 25%,#222236 50%,#1a1a2e 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-body { padding:10px; }
.skel-line { height:8px; background:#1a1a2e; border-radius:4px; margin-bottom:6px; }
.empty { text-align:center; color:var(--muted); padding:60px 0; font-size:14px; grid-column:1/-1; }
.overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.8); backdrop-filter:blur(12px); align-items:flex-end; justify-content:center; }
@media(min-width:540px){ .overlay{align-items:center} }
.overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:20px 20px 0 0; width:100%; max-width:460px; max-height:85vh; overflow:hidden; display:flex; flex-direction:column; animation:slideUp 0.3s cubic-bezier(0.25,0.8,0.25,1); }
@media(min-width:540px){ .modal{border-radius:16px;max-height:80vh;animation:popIn 0.25s cubic-bezier(0.25,0.8,0.25,1)} }
@keyframes slideUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes popIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 0; display:block; }
@media(min-width:540px){ .modal-handle{display:none} }
.modal-head { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:12px; }
.modal-thumb { width:42px; height:60px; border-radius:6px; object-fit:cover; flex-shrink:0; background:#1a1a2e; }
.modal-meta { flex:1; }
.modal-num { font-size:9px; letter-spacing:3px; color:var(--red); margin-bottom:3px; }
.modal-title { font-family:'Archivo Black',sans-serif; font-size:15px; line-height:1.3; }
.modal-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.close-btn { background:var(--surface2); border:1px solid var(--border); color:var(--muted); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; flex-shrink:0; transition:all 0.15s; }
.close-btn:hover { color:var(--text); border-color:var(--muted); }
.link-list { overflow-y:auto; padding:12px 16px 20px; display:flex; flex-direction:column; gap:6px; }
.link-item { display:flex; align-items:center; gap:12px; padding:13px 14px; background:var(--bg); border:1px solid var(--border); border-radius:10px; text-decoration:none; color:var(--text); transition:all 0.15s; position:relative; overflow:hidden; }
.link-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--red); opacity:0; transition:opacity 0.15s; }
.link-item:hover { border-color:rgba(255,45,85,0.3); background:var(--surface2); }
.link-item:hover::before { opacity:1; }
.link-n { font-family:'Archivo Black',sans-serif; font-size:15px; color:var(--red); min-width:22px; }
.link-label { flex:1; font-size:13px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.link-arrow { color:var(--muted); font-size:13px; transition:transform 0.15s; }
.link-item:hover .link-arrow { transform:translateX(3px); color:var(--red); }
.link-list::-webkit-scrollbar { width:4px; }
.link-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
footer { text-align:center; padding:24px 16px; border-top:1px solid var(--border); color:var(--muted); font-size:11px; letter-spacing:1px; position:relative; z-index:1; }
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot"></div>VIXPLAY</div>
  <div class="live-badge"><div class="logo-dot" style="width:6px;height:6px;animation-delay:0.5s"></div>LIVE</div>
</header>
<div class="marquee-wrap">
  <div class="marquee">
    <span class="hot">★ UPDATE SETIAP HARI</span><span>·</span><span>KOLEKSI TERLENGKAP</span><span>·</span><span class="hot">★ GRATIS TANPA RIBET</span><span>·</span><span>STREAMING ONLINE</span><span>·</span><span class="hot">★ UPDATE SETIAP HARI</span><span>·</span><span>KOLEKSI TERLENGKAP</span><span>·</span><span class="hot">★ GRATIS TANPA RIBET</span><span>·</span><span>STREAMING ONLINE</span><span>·</span><span class="hot">★ UPDATE SETIAP HARI</span><span>·</span><span>KOLEKSI TERLENGKAP</span><span>·</span><span class="hot">★ GRATIS TANPA RIBET</span><span>·</span><span>STREAMING ONLINE</span><span>·</span>
  </div>
</div>
<div class="container">
  <div class="section-header">
    <span class="section-label">Koleksi</span>
    <div class="section-line"></div>
    <span class="section-count" id="totalCount"></span>
  </div>
  <div class="grid" id="grid">
    <div class="skeleton"><div class="skel-thumb"></div><div class="skel-body"><div class="skel-line" style="width:60%"></div><div class="skel-line" style="width:80%"></div></div></div>
    <div class="skeleton"><div class="skel-thumb"></div><div class="skel-body"><div class="skel-line" style="width:60%"></div><div class="skel-line" style="width:80%"></div></div></div>
    <div class="skeleton"><div class="skel-thumb"></div><div class="skel-body"><div class="skel-line" style="width:60%"></div><div class="skel-line" style="width:80%"></div></div></div>
    <div class="skeleton"><div class="skel-thumb"></div><div class="skel-body"><div class="skel-line" style="width:60%"></div><div class="skel-line" style="width:80%"></div></div></div>
  </div>
</div>
<footer>VIXPLAY © 2026 — UPDATE HARIAN</footer>
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <img class="modal-thumb" id="modalThumb" src="" alt="">
      <div class="modal-meta">
        <div class="modal-num" id="modalNum"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="link-list" id="modalLinks"></div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyA_cYWGjLX-KjkT-wRsmdJaIdQq0vleu9g",
  authDomain: "vixplay-accb5.firebaseapp.com",
  projectId: "vixplay-accb5",
  storageBucket: "vixplay-accb5.firebasestorage.app",
  messagingSenderId: "517043418477",
  appId: "1:517043418477:web:73fbf7875fc4bd7985d664"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let posts = [];
async function loadPosts() {
  const grid = document.getElementById('grid');
  try {
    const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    posts = [];
    snap.forEach((d,i) => posts.push({ id:d.id, num:i+1, ...d.data() }));
    grid.innerHTML = '';
    document.getElementById('totalCount').textContent = posts.length + ' JUDUL';
    if (posts.length === 0) { grid.innerHTML = '<div class="empty">Belum ada konten</div>'; return; }
    posts.forEach((item, i) => {
      const isNew = i < 2;
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (i * 0.06) + 's';
      card.onclick = () => openModal(i);
      card.innerHTML = `<div class="thumb"><img src="${item.thumb}" alt="${item.title}" loading="lazy" onerror="this.src='https://placehold.co/300x450/1a1a2e/444?text=?'"><div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div><div class="count-badge">${item.links.length} link</div>${isNew?'<div class="new-badge">NEW</div>':''}<div class="card-info"><div class="card-num">NO. ${String(i+1).padStart(2,'0')}</div><div class="card-title">${item.title}</div></div></div>`;
      grid.appendChild(card);
    });
  } catch(e) { grid.innerHTML = '<div class="empty">Gagal memuat konten</div>'; }
}
window.openModal = function(i) {
  const item = posts[i];
  document.getElementById('modalThumb').src = item.thumb;
  document.getElementById('modalNum').textContent = 'NO. ' + String(i+1).padStart(2,'0');
  document.getElementById('modalTitle').textContent = item.title;
  document.getElementById('modalSub').textContent = item.links.length + ' link tersedia';
  document.getElementById('modalLinks').innerHTML = item.links.map((l,idx) => `<a class="link-item" href="${l.url}" target="_blank" rel="noopener"><span class="link-n">${idx+1}</span><span class="link-label">${l.label}</span><span class="link-arrow">→</span></a>`).join('');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
};
window.closeModal = function() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; };
window.handleOverlay = function(e) { if(e.target===document.getElementById('overlay')) closeModal(); };
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
loadPosts();
</script>
</body>
</html>
